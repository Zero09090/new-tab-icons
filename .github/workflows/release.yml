name: Build and Release Chrome Extension

on:
  push:
    tags:
      - 'v*' # Triggers CI/CD only when you push a new version tag (e.g., v1.0.0)
  # Allows you to manually trigger the workflow from the Actions tab
  workflow_dispatch: 

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required to create a Release
      
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Create Extension .zip
        # Zips everything in your folder, ignoring git files and the workflow itself
        run: zip -r new-tab-extension.zip . -x "*.git*" ".github/*" "backup/*"

      - name: Pack into .crx File
        # Uses a trusted open-source action to generate the .crx payload
        uses: cardinalby/webext-buildtools-chrome-crx-action@v2
        with:
          zipFilePath: 'new-tab-extension.zip'
          crxFilePath: 'new-tab-extension.crx'
          # This requires you to paste your .pem text into a GitHub Secret
          privateKey: ${{ secrets.CHROME_CRX_PRIVATE_KEY }}

      - name: Upload to GitHub Releases (Cloud Sync)
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          files: |
            new-tab-extension.zip
            new-tab-extension.crx
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
